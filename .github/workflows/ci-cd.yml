name: 🚀 Space Impact CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: ⚙️ Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Prepare Build
        run: |
          mkdir dist
          cp -r * dist

      - name: 📤 Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: 🚀 Deploy
        uses: actions/deploy-pages@v4
